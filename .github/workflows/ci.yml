name: CI

# Testet den oeffentlichen Bestand (ohne die privaten Kaufbuch-Reparaturmodule und ohne
# die echte Dev-DB): Fixture-Tests laufen gegen synthetische SQLite-DBs, die Golden-Suite
# und die efota/frhof-Tests ueberspringen sich selbst, wenn ihre Voraussetzungen fehlen.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} einrichten
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Abhaengigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tests (pytest)
        run: pytest -q
