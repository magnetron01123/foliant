<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Charakterbogen auf Deutsch</title>
  <link rel="stylesheet" href="static/site.css">
</head>
<body>
  <main class="karte">
    <h1>Charakterbogen auf Deutsch</h1>
    <p class="unter">Diese Seite ist privat. Bitte gib das Kennwort der Runde ein.</p>
    <form method="post" action="anmeldung">
      <label class="feld">
        <span>Kennwort</span>
        <input type="password" name="kennwort" autocomplete="current-password" autofocus required>
      </label>
      <button type="submit">Weiter</button>
    </form>
  </main>
</body>
</html>
